<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Hintergrund: dunkles Terminal-Fenster -->
  <rect width="256" height="256" rx="32" ry="32" fill="#1a1a2e"/>
  <!-- Titelleiste -->
  <rect x="0" y="0" width="256" height="48" rx="32" ry="32" fill="#16213e"/>
  <rect x="0" y="24" width="256" height="24" fill="#16213e"/>
  <!-- Ampel-Dots -->
  <circle cx="32" cy="24" r="8" fill="#ff5f57"/>
  <circle cx="56" cy="24" r="8" fill="#febc2e"/>
  <circle cx="80" cy="24" r="8" fill="#28c840"/>
  <!-- Terminal-Text: grüner Cursor-Prompt -->
  <text x="24" y="100" font-family="monospace" font-size="32" fill="#00ff88" font-weight="bold">ssh-easy</text>
  <!-- Blitz/Verbindungs-Symbol -->
  <polygon points="148,120 120,168 138,168 110,216 168,156 146,156 176,120" fill="#4ecdc4"/>
  <!-- Unterstrich/Cursor -->
  <rect x="24" y="220" width="80" height="6" rx="3" fill="#00ff88" opacity="0.8"/>
</svg>
